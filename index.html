<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendant Task Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #2b2b2b;
  color: #fff;
}

/* HEADER */
header {
  background: #1f1f1f;
  padding: 10px 15px;
  font-size: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  border-bottom: 2px solid #444;
}

.header-left {
  text-align: left;
}

.header-center {
  text-align: center;
  font-weight: bold;
  font-size: 28px;
}

.header-right {
  text-align: right;
  font-size: 13px;
  opacity: 0.85;
}

/* TABLE */
.table-container {
  padding: 10px;
  max-height: 90vh;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th {
  text-align: left;
  padding: 10px;
  background: #333;
  position: sticky;
  top: 0;
  z-index: 5;
}

td {
  padding: 8px 10px;
  border-bottom: 1px solid #3a3a3a;
}

tr:hover {
  background: #3a3a3a;
}

/* PRIORITY */
.pill {
  padding: 3px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
}

.prio-low { background:#6ea8fe; color:#000; }
.prio-medium { background:#ffd43b; color:#000; }
.prio-high { background:#ff6b6b; color:#000; }

/* STATUS */
.status-todo { background:#adb5bd; color:#000; }
.status-progress { background:#74c0fc; color:#000; }
.status-done { background:#69db7c; color:#000; }

/* URGENT PULSE */
@keyframes pulse {
  0% { background:#ff3b3b33; }
  50% { background:#ff3b3b99; }
  100% { background:#ff3b3b33; }
}
.urgent {
  animation: pulse 1.2s infinite;
}

/* STATUS CHANGE FLASH */
@keyframes flashFade {
  0% { background:#ffd43b; }
  100% { background:transparent; }
}
.highlight-change {
  animation: flashFade 5s ease-out;
}

/* NAME COLORS (UPDATED) */
.assigned-name {
  color: #4fc3ff; /* sky blue */
  font-weight: 600;
}

.reported-name {
  color: #ff3b3b; /* bright red */
  font-weight: 600;
}

/* EDIT BUTTON */
#edit {
  position: fixed;
  bottom: 12px;
  right: 12px;
  background: #f1c40f;
  padding: 8px 12px;
  font-weight: bold;
  color: #000;
  border-radius: 5px;
}

/* KIOSK MODE */
.kiosk-hidden tr {
  display: none;
}
.kiosk-hidden tr.active {
  display: table-row;
}
</style>
</head>

<body>

<header>
  <div class="header-left">Attendant Task Dashboard</div>
  <div class="header-center" id="clock">--:--:--</div>
  <div class="header-right" id="updated">Loading...</div>
</header>

<div class="table-container">
<table>
  <thead>
    <tr>
      <th>Task ID</th>
      <th>Game</th>
      <th>Issue Description</th>
      <th>Assigned</th>
      <th>Priority</th>
      <th>Status</th>
      <th>Reported By</th>
      <th>Date Reported</th>
    </tr>
  </thead>
  <tbody id="body"></tbody>
</table>
</div>

<a id="edit" target="_blank"
href="https://docs.google.com/spreadsheets/d/e/2PACX-1vSw8cVbdhNKaS0_aYv7MnyjIge-15X21RKBYBPH8LgeX7bav9D-adRVRKNdaqBC6_NNk7qjmDLlCn0S/pubhtml?gid=69095141&single=true">
Edit Board
</a>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbze_lxrJPRUGIt_NzMEPRugpI4I5XwAsyEqaloj3APs8qMG6l4tqx51em40E1L1_X2Wnw/exec?view=attendant";

let previousData = {};
let kioskMode = false;

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    detectNewTasks(data);
    render(data);

    document.getElementById("updated").innerText =
      "Updated: " + new Date().toLocaleTimeString();

  } catch (err) {
    console.error(err);
  }
}

/* CLOCK */
function updateClock() {
  const now = new Date();

  const timeParts = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/Chicago",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: true
  }).formatToParts(now);

  const hour = parseInt(timeParts.find(p => p.type === "hour").value, 10);
  const minute = timeParts.find(p => p.type === "minute").value;
  const second = timeParts.find(p => p.type === "second").value;
  const dayPeriod = timeParts.find(p => p.type === "dayPeriod").value;

  document.getElementById("clock").innerText =
    `${hour}:${minute}:${second} ${dayPeriod}`;
}
setInterval(updateClock, 1000);
updateClock();

/* DATE FORMAT */
function formatDate(v) {
  if (!v) return "";
  const d = new Date(v);
  if (isNaN(d)) return v;

  return new Intl.DateTimeFormat("en-US", {
    timeZone: "America/Chicago",
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit",
    hour12:true
  }).format(d);
}

/* PRIORITY + STATUS BADGES */
function badge(type, value) {
  if (!value) return "";

  const v = value.toLowerCase();

  if (type === "prio") {
    if (v === "high") return `<span class="pill prio-high">High</span>`;
    if (v === "medium") return `<span class="pill prio-medium">Medium</span>`;
    return `<span class="pill prio-low">${value}</span>`;
  }

  if (type === "status") {
    if (v.includes("todo")) return `<span class="pill status-todo">${value}</span>`;
    if (v.includes("progress")) return `<span class="pill status-progress">${value}</span>`;
    if (v.includes("done")) return `<span class="pill status-done">${value}</span>`;
    return `<span class="pill">${value}</span>`;
  }

  return value;
}

/* NEW TASK SOUND */
function beep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.frequency.value = 880;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.15);
}

/* DETECT NEW TASKS */
function detectNewTasks(data) {
  data.forEach(r => {
    const id = r["Task ID"];
    if (id && !previousData[id]) {
      beep();
    }
  });
}

/* RENDER */
function render(data) {

  const body = document.getElementById("body");
  body.innerHTML = "";

  data.forEach(r => {

    const id = r["Task ID"];
    const old = previousData[id];

    const statusChanged = old && old["Status"] !== r["Status"];
    const isUrgent = (r["Priority"] || "").toLowerCase() === "high";

    body.innerHTML += `
      <tr class="
        ${statusChanged ? "highlight-change" : ""}
        ${isUrgent ? "urgent" : ""}
        ${kioskMode ? "active" : ""}
      ">
        <td>${r["Task ID"] || ""}</td>

        <td>
          <div>${r["Game"] || ""}</div>
          <div style="font-size:11px;opacity:0.7">${r["Position"] || ""}</div>
        </td>

        <td>${r["Issue Description"] || ""}</td>

        <td><span class="assigned-name">${r["Assigned"] || ""}</span></td>

        <td>${badge("prio", r["Priority"])}</td>

        <td>${badge("status", r["Status"])}</td>

        <td><span class="reported-name">${r["Reported By"] || ""}</span></td>

        <td>${formatDate(r["Date Reported"])}</td>
      </tr>
    `;
  });

  previousData = {};
  data.forEach(r => previousData[r["Task ID"]] = r);
}

/* HOTKEY */
document.addEventListener("keydown", e => {
  if (e.key === "k") {
    kioskMode = !kioskMode;
    loadData();
  }
});

loadData();
setInterval(loadData, 10000);

</script>

</body>
</html>
